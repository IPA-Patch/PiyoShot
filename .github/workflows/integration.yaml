name: integration

# CI: cross-check the recipe sites against the dump, then build all three
# distribution flavors — the rootless .deb (MobileSubstrate path), the
# jailed .dylib (Dobby-static path), and the chinlan .dylib (iOS 18
# __DATA slot-table path) — on every push/PR to the protected branches.
# Fails fast if either dylib accidentally picks up an external hook-engine
# dependency, since that would brick Sideloadly/TrollStore installs.
#
# This workflow never publishes anything. Releases are handled separately
# by deployment.yaml (tag-triggered, owns the GitHub Release upload).

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  THEOS: ${{ github.workspace }}/theos
  IOS_SDK_VERSION: "16.5"
  LDID_VERSION: "v2.1.5-procursus7"

jobs:
  commitlint:
    name: Commit Lint
    if: github.event.action != 'closed' || github.event.pull_request.merged != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # commitlint --from HEAD~N needs the prior N commits in the
          # working tree; the default shallow clone breaks that lookup.
          fetch-depth: 0
      - name: Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install commitlint
        # .commitlintrc.yaml extends @commitlint/config-conventional, so
        # that package has to land alongside commitlint itself or the
        # config loader throws MODULE_NOT_FOUND before any commit is
        # inspected. conventional-changelog-conventionalcommits is the
        # underlying preset config-conventional resolves to.
        run: |
          bun install conventional-changelog-conventionalcommits
          bun install @commitlint/config-conventional@latest
          bun install commitlint@latest
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: bunx commitlint --last --verbose
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  # Recipe<->dump cross-check (verify_sites) is NOT run here. It needs
  # assets/dump.cs.index.json, which is .gitignored under the project's
  # analysis-artifact layering (raw binaries and machine-generated dumps
  # are not committed; only curated specs are). The check runs locally
  # as a pre-commit hook (scripts/pre-commit, installed via `make hooks`)
  # against the operator's own dump index.
  #
  # The build job below only catches *build-time* errors in the dylib
  # (compile failures, link failures, accidental external hook-engine
  # dependency). It does NOT exercise `patch_macho`, which is part of
  # `make ipa` and needs the decrypted IPA — that step has to run on
  # the operator's machine. Recipe-level mistakes (stale CAVE_REGION,
  # prologue drift) are caught by `tools.patch_macho` when the operator
  # runs `make ipa` against their own assets/PiyoShogi-5.7.5.ipa.
  build:
    name: Build (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: substrate
            make_target: package
            artifact_name: piyoshot-substrate-deb
            artifact_path: packages/*.deb
          - flavor: jailed
            make_target: jailed
            artifact_name: piyoshot-jailed-dylib
            artifact_path: packages/jailed/PiyoShot.dylib
          - flavor: chinlan
            make_target: chinlan
            artifact_name: piyoshot-chinlan-dylib
            artifact_path: packages/chinlan/PiyoShot.dylib

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential curl git make perl xz-utils \
              libplist-utils libc++-dev \
              libtinfo6 libncurses6 \
              python3 python3-pip

      - name: Install ldid
        run: |
          curl -L -o /tmp/ldid \
              "https://github.com/ProcursusTeam/ldid/releases/download/${LDID_VERSION}/ldid_linux_x86_64"
          sudo install -m 0755 /tmp/ldid /usr/local/bin/ldid
          ldid -V || ldid 2>&1 | head -1 || true

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: theos-linux-${{ env.IOS_SDK_VERSION }}-v1

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"

          ARCH=$(uname -m)
          curl -fsSL \
              "https://github.com/L1ghtmann/llvm-project/releases/latest/download/iOSToolchain-${ARCH}.tar.xz" \
            | tar xJ -C "$THEOS/toolchain"

          mkdir -p "$THEOS/sdks"
          curl -L -o /tmp/sdk.tar.gz \
              "https://github.com/theos/sdks/archive/master.tar.gz"
          tar -xf /tmp/sdk.tar.gz -C /tmp
          cp -R "/tmp/sdks-master/iPhoneOS${IOS_SDK_VERSION}.sdk" \
                "$THEOS/sdks/"

      - name: Verify Theos
        run: |
          test -d "$THEOS/sdks/iPhoneOS${IOS_SDK_VERSION}.sdk"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          "$THEOS/toolchain/linux/iphone/bin/clang" --version

      - name: Build (${{ matrix.flavor }})
        run: |
          make clean
          make ${{ matrix.make_target }}
          ls -la packages/ || true
          ls -la packages/jailed/ packages/chinlan/ 2>/dev/null || true

      - name: Sanity-check dylib (no external hook engine)
        if: matrix.flavor != 'substrate'
        run: |
          # The jailed and chinlan builds statically link Dobby; neither
          # may carry an external libsubstrate/libdobby dependency or it
          # would fail to load on a sideloaded install.
          DYLIB="${{ matrix.artifact_path }}"
          test -f "$DYLIB"
          if command -v otool >/dev/null 2>&1; then
              otool -L "$DYLIB"
              if otool -L "$DYLIB" | grep -E "libsubstrate|libdobby"; then
                  echo "::error::$DYLIB leaks an external hook-engine dependency"
                  exit 1
              fi
          else
              if strings "$DYLIB" | grep -E "libsubstrate|libdobby\.dylib"; then
                  echo "::error::$DYLIB leaks an external hook-engine dependency"
                  exit 1
              fi
              echo "  $DYLIB: no external hook-engine references found"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
